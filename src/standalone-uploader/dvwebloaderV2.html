<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DVWebloader V2 — Demo</title>
    <!--
      Direct-embed usage in JSF (or any HTML page):

        <div id="dv-uploader"></div>
        <script>
          window.dvUploaderConfig = {
            siteUrl:    'https://your-dataverse.edu',
            datasetPid: 'doi:10.5072/FK2/XXXXX',
            locale:     'en'
          }
        </script>
        <script type="module" src=".../reusable-components/dv-uploader.js"></script>

      The host page is responsible for its own page-level styling. The bundle
      below only ships component styles scoped to `.dv-uploader-root`. The
      page styles loaded here (`standalone-page.css`) are for this demo only
      and are NOT part of the embedded bundle.

      Authentication uses the browser JSESSIONID session cookie.
      DATAVERSE_FEATURE_API_SESSION_AUTH must be enabled.
    -->
    <link rel="stylesheet" href="standalone-page.css" />
    <script>
      window.dvUploaderConfig = {
        siteUrl:
          new URLSearchParams(window.location.search).get('siteUrl') || 'http://localhost:8080',
        datasetPid: new URLSearchParams(window.location.search).get('datasetPid') || '',
        locale: new URLSearchParams(window.location.search).get('dvLocale') || 'en'
      }
    </script>
    <script type="module" src="reusable-components/dv-uploader.js"></script>
  </head>
  <body>
    <div class="standalone-uploader-page">
      <div id="dv-uploader"></div>
    </div>
  </body>
</html>
