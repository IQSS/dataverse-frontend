<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DVWebloader V2 — Demo</title>
    <!--
      Direct-embed usage in JSF (or any HTML page):

        <div id="dv-uploader"></div>
        <script>
          window.dvUploaderConfig = {
            siteUrl:    'https://your-dataverse.edu',
            datasetPid: 'doi:10.5072/FK2/XXXXX',
            locale:     'en'
          }
        </script>
        <script src=".../dvwebloader-v2.js"></script>

      Authentication uses the browser JSESSIONID session cookie.
      DATAVERSE_FEATURE_API_SESSION_AUTH must be enabled.
    -->
    <script>
      window.dvUploaderConfig = {
        siteUrl:
          new URLSearchParams(window.location.search).get('siteUrl') || 'http://localhost:8080',
        datasetPid: new URLSearchParams(window.location.search).get('datasetPid') || '',
        locale: new URLSearchParams(window.location.search).get('dvLocale') || 'en'
      }
    </script>
    <script type="module" src="dvwebloader-v2.js"></script>
  </head>
  <body>
    <div id="dv-uploader"></div>
  </body>
</html>
